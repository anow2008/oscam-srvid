name: Generate OSCam SRVID

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl grep sed

      - name: Run Generator Script
        run: |
          # الدخول للمسار الصحيح حسب صورتك
          cd oscam-srvid/kingofsat
          chmod +x oscam-srvid-generator-kingofsat.sh
          ./oscam-srvid-generator-kingofsat.sh

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # إضافة الملفات من المسار الصحيح
          git add oscam-srvid/kingofsat/*.srvid
          git commit -m "Update oscam.srvid $(date)" || exit 0
          git push
