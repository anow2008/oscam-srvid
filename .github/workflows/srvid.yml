name: Generate OSCam SRVID (OpenVision Style)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # يعمل يومياً

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y curl wget grep sed coreutils

      - name: Execute KingOfSat Script
        run: |
          # البحث عن المجلد الصحيح
          SCRIPT_PATH=$(find . -name "oscam-srvid-generator-kingofsat.sh")
          SCRIPT_DIR=$(dirname "$SCRIPT_PATH")
          chmod +x "$SCRIPT_PATH"
          cd "$SCRIPT_DIR"
          
          # خدعة تخطي الحماية: تظاهر بأنك متصفح حقيقي
          export USER_AGENT="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          
          # تشغيل السكربت
          ./oscam-srvid-generator-kingofsat.sh

      - name: Save and Push Changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action Bot"
          git add -A
          # إذا وجد تغييرات يرفعها، إذا لم يجد لا يظهر خطأ
          git commit -m "Auto Update: $(date +'%Y-%m-%d')" || exit 0
          git push
