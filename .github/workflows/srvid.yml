name: Generate OSCam SRVID

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

# حل مشكلة التحذير بإجبار استخدام Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget grep sed awk

      - name: Run Generator Script
        run: |
          # البحث عن المجلد الذي يحتوي على السكربت والدخول إليه
          SCRIPT_PATH=$(find . -name "oscam-srvid-generator-kingofsat.sh" -print -quit)
          if [ -z "$SCRIPT_PATH" ]; then
            echo "Error: Script not found!"
            exit 1
          fi
          SCRIPT_DIR=$(dirname "$SCRIPT_PATH")
          cd "$SCRIPT_DIR"
          chmod +x oscam-srvid-generator-kingofsat.sh
          ./oscam-srvid-generator-kingofsat.sh

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # إضافة الملف الناتج مهما كان مكانه
          git add "*.srvid" || git add "**/*.srvid"
          git commit -m "Update oscam.srvid $(date)" || echo "No changes to commit"
          git push
